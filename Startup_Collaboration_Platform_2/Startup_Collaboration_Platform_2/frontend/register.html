<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register — StartupCollab</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display:flex;align-items:center;justify-content:center;min-height:100vh; }
    .bg-grid { position:fixed;inset:0;z-index:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:40px 40px;opacity:0.3; }
    .auth-container { position:relative;z-index:1;width:100%;max-width:460px;padding:1rem;animation:fadeIn 0.5s ease; }
    .logo-area { text-align:center;margin-bottom:1.5rem; }
    .logo { font-family:'Syne',sans-serif;font-size:2rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;display:block;margin-bottom:0.3rem; }
    .auth-card { background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;box-shadow:0 8px 40px rgba(0,0,0,0.4); }
    .auth-card h2 { margin-bottom:1.5rem;font-size:1.4rem; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="auth-container">
    <div class="logo-area">
      <span class="logo">⚡ StartupCollab</span>
      <p style="color:var(--text-muted);font-size:0.9rem">Join the platform</p>
    </div>
    <div class="auth-card">
      <h2>Create Account</h2>
      <div id="reg-alert" class="alert"></div>
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" id="reg-name" placeholder="Your full name"/>
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" id="reg-email" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters"/>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label>Role *</label>
          <select id="reg-role">
            <option value="">Select role</option>
            <option value="Founder">🚀 Founder</option>
            <option value="Developer">💻 Developer</option>
            <option value="Investor">💰 Investor</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="reg-location" placeholder="City"/>
        </div>
      </div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">Create Account →</button>
      <p style="text-align:center;margin-top:1rem;font-size:0.875rem;color:var(--text-muted)">Already have an account? <a href="index.html">Login</a></p>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:5000/api';
    if (localStorage.getItem('user_id')) window.location.href = 'dashboard.html';

    function showAlert(msg, type) {
      const el = document.getElementById('reg-alert');
      el.textContent = msg; el.className = `alert alert-${type} show`;
    }

    async function doRegister() {
      const full_name = document.getElementById('reg-name').value.trim();
      const email     = document.getElementById('reg-email').value.trim();
      const password  = document.getElementById('reg-password').value;
      const role      = document.getElementById('reg-role').value;
      const location  = document.getElementById('reg-location').value.trim();
      if (!full_name || !email || !password || !role) return showAlert('Please fill all required fields', 'error');
      if (password.length < 6) return showAlert('Password must be at least 6 characters', 'error');
      try {
        const res  = await fetch(`${API}/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({full_name, email, password, role, location}) });
        const data = await res.json();
        if (data.status === 'success') {
          showAlert('Account created! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'index.html', 1200);
        } else {
          showAlert(data.message, 'error');
        }
      } catch(e) { showAlert('Server error. Is Flask running?', 'error'); }
    }
  </script>
</body>
</html>
