<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>StartupCollab — Login</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .bg-grid {
      position: fixed; inset: 0; z-index: 0;
      background-image: linear-gradient(var(--border) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
    }
    .glow {
      position: fixed; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(108,99,255,0.15) 0%, transparent 70%);
      top: -100px; left: -100px; z-index: 0; pointer-events: none;
    }
    .glow2 {
      position: fixed; width: 400px; height: 400px; border-radius: 50%;
      background: radial-gradient(circle, rgba(0,212,170,0.1) 0%, transparent 70%);
      bottom: -50px; right: -50px; z-index: 0; pointer-events: none;
    }
    .auth-container {
      position: relative; z-index: 1;
      width: 100%; max-width: 420px;
      padding: 1rem;
      animation: fadeIn 0.5s ease;
    }
    .logo-area { text-align: center; margin-bottom: 2rem; }
    .logo-area .logo {
      font-family: 'Syne', sans-serif;
      font-size: 2rem; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
      display: block; margin-bottom: 0.5rem;
    }
    .logo-area p { color: var(--text-muted); font-size: 0.9rem; }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 8px 40px rgba(0,0,0,0.4);
    }
    .auth-tabs {
      display: flex; gap: 0; margin-bottom: 1.5rem;
      background: var(--bg3); border-radius: 8px; padding: 4px;
    }
    .auth-tab {
      flex: 1; padding: 0.5rem; text-align: center;
      border-radius: 6px; cursor: pointer;
      font-size: 0.875rem; font-weight: 600;
      color: var(--text-muted); transition: all 0.2s;
      border: none; background: none; font-family: 'Inter', sans-serif;
    }
    .auth-tab.active { background: var(--accent); color: #fff; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .divider {
      text-align: center; color: var(--text-muted);
      font-size: 0.8rem; margin: 1rem 0; position: relative;
    }
    .divider::before, .divider::after {
      content: ''; position: absolute; top: 50%; width: 42%;
      height: 1px; background: var(--border);
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }
    .features {
      display: flex; justify-content: center; gap: 1.5rem;
      margin-top: 2rem; flex-wrap: wrap;
    }
    .feature { text-align: center; color: var(--text-muted); font-size: 0.8rem; }
    .feature .icon { font-size: 1.4rem; margin-bottom: 0.3rem; }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow"></div>
  <div class="glow2"></div>

  <div class="auth-container">
    <div class="logo-area">
      <span class="logo">⚡ StartupCollab</span>
      <p>Where ideas meet execution</p>
    </div>

    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchTab('login')">Login</button>
        <button class="auth-tab" onclick="switchTab('register')">Register</button>
      </div>

      <!-- LOGIN TAB -->
      <div class="tab-content active" id="tab-login">
        <div id="login-alert" class="alert"></div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="login-email" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••"/>
        </div>
        <button class="btn btn-primary btn-block" onclick="doLogin()">Login →</button>
      </div>

      <!-- REGISTER TAB -->
      <div class="tab-content" id="tab-register">
        <div id="reg-alert" class="alert"></div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="reg-name" placeholder="Your full name"/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="reg-password" placeholder="Min 6 characters"/>
        </div>
        <div class="form-group">
          <label>Role</label>
          <select id="reg-role">
            <option value="">Select your role</option>
            <option value="Founder">🚀 Founder</option>
            <option value="Developer">💻 Developer</option>
            <option value="Investor">💰 Investor</option>
          </select>
        </div>
        <div class="form-group">
          <label>Location</label>
          <input type="text" id="reg-location" placeholder="City, Country"/>
        </div>
        <button class="btn btn-primary btn-block" onclick="doRegister()">Create Account →</button>
      </div>
    </div>

    <div class="features">
      <div class="feature"><div class="icon">🚀</div>Post Ideas</div>
      <div class="feature"><div class="icon">🤝</div>Collaborate</div>
      <div class="feature"><div class="icon">💰</div>Get Funded</div>
      <div class="feature"><div class="icon">📊</div>Track Progress</div>
    </div>
  </div>

  <script>
    const API = 'http://127.0.0.1:5000/api';

    function switchTab(tab) {
      document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='register')));
      document.getElementById('tab-login').classList.toggle('active', tab==='login');
      document.getElementById('tab-register').classList.toggle('active', tab==='register');
    }

    function showAlert(id, msg, type) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.className = `alert alert-${type} show`;
    }

    async function doLogin() {
      const email    = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      if (!email || !password) return showAlert('login-alert', 'Please fill all fields', 'error');
      try {
        const res  = await fetch(`${API}/login`, { method:'POST', headers:{'Content-Type':'application/json'}, credentials:'include', body: JSON.stringify({email, password}) });
        const data = await res.json();
        if (data.status === 'success') {
          localStorage.setItem('user_id', data.user_id);
          localStorage.setItem('role', data.role);
          showAlert('login-alert', 'Login successful! Redirecting...', 'success');
          setTimeout(() => window.location.href = 'dashboard.html', 800);
        } else {
          showAlert('login-alert', data.message, 'error');
        }
      } catch(e) { showAlert('login-alert', 'Server error. Is Flask running?', 'error'); }
    }

    async function doRegister() {
      const full_name = document.getElementById('reg-name').value.trim();
      const email     = document.getElementById('reg-email').value.trim();
      const password  = document.getElementById('reg-password').value;
      const role      = document.getElementById('reg-role').value;
      const location  = document.getElementById('reg-location').value.trim();
      if (!full_name || !email || !password || !role) return showAlert('reg-alert', 'Please fill all required fields', 'error');
      try {
        const res  = await fetch(`${API}/register`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({full_name, email, password, role, location}) });
        const data = await res.json();
        if (data.status === 'success') {
          showAlert('reg-alert', 'Registered! Please login.', 'success');
          setTimeout(() => switchTab('login'), 1000);
        } else {
          showAlert('reg-alert', data.message, 'error');
        }
      } catch(e) { showAlert('reg-alert', 'Server error. Is Flask running?', 'error'); }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('tab-login').classList.contains('active')) doLogin();
        else doRegister();
      }
    });

    // Redirect if already logged in
    if (localStorage.getItem('user_id')) window.location.href = 'dashboard.html';
  </script>
</body>
</html>
